<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="popup.css">
  <title>FocusWave</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <button class="palette-btn" id="paletteBtn" aria-label="Choose theme">
        <svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor">
          <circle cx="6"  cy="6"  r="2.5"/>
          <circle cx="14" cy="6"  r="2.5" opacity="0.7"/>
          <circle cx="6"  cy="14" r="2.5" opacity="0.5"/>
          <circle cx="14" cy="14" r="2.5" opacity="0.35"/>
        </svg>
      </button>
      <div class="header-top">
        <h1 class="title">FOCUSWAVE</h1>
        <span class="pro-badge hidden" id="proBadge">PRO</span>
        <button class="upgrade-link hidden" id="upgradeLink">Upgrade</button>
      </div>
      <span class="subtitle">Binaural Beats Generator</span>
    </header>

    <div class="theme-panel hidden" id="themePanel">
      <button class="theme-swatch" data-theme="dark"     style="background:linear-gradient(135deg,#0d0e14 50%,#ffc24d 50%)" title="Dark"></button>
      <button class="theme-swatch" data-theme="light"    style="background:linear-gradient(135deg,#f3f1ec 50%,#b4540a 50%)" title="Light"></button>
      <button class="theme-swatch" data-theme="midnight" style="background:linear-gradient(135deg,#0a0f1e 50%,#6fb2ff 50%)" title="Midnight"></button>
      <button class="theme-swatch" data-theme="forest"   style="background:linear-gradient(135deg,#0a1410 50%,#4fe0a0 50%)" title="Forest"></button>
      <button class="theme-swatch" data-theme="sunset"   style="background:linear-gradient(135deg,#1a0d10 50%,#ff8a5c 50%)" title="Sunset"></button>
      <button class="theme-swatch" data-theme="ocean"    style="background:linear-gradient(135deg,#08131c 50%,#37d7ee 50%)" title="Ocean"></button>
    </div>

    <div class="card presets-card">
      <div class="presets-grid">
        <button class="preset-btn" data-preset="delta">
          <span class="preset-name">Delta</span>
          <span class="preset-hz">2 Hz</span>
          <span class="preset-use">Deep Sleep</span>
          <span class="lock-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></span>
        </button>
        <button class="preset-btn" data-preset="theta">
          <span class="preset-name">Theta</span>
          <span class="preset-hz">6 Hz</span>
          <span class="preset-use">Meditation</span>
          <span class="lock-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></span>
        </button>
        <button class="preset-btn" data-preset="alpha">
          <span class="preset-name">Alpha</span>
          <span class="preset-hz">10 Hz</span>
          <span class="preset-use">Calm Focus</span>
        </button>
        <button class="preset-btn" data-preset="beta">
          <span class="preset-name">Beta</span>
          <span class="preset-hz">14 Hz</span>
          <span class="preset-use">Concentrate</span>
        </button>
        <button class="preset-btn" data-preset="gamma">
          <span class="preset-name">Gamma</span>
          <span class="preset-hz">40 Hz</span>
          <span class="preset-use">Peak Mode</span>
          <span class="lock-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></span>
        </button>
      </div>
    </div>

    <div class="state-display">
      <span class="state-preset" id="statePreset">Beta</span>
      <span class="state-separator">&middot;</span>
      <span class="state-freq" id="stateFreq">14 Hz</span>
      <div class="state-label" id="stateLabel">Concentration</div>
    </div>

    <div class="visualizer-container">
      <canvas id="visualizer" width="320" height="56"></canvas>
    </div>

    <button class="play-btn" id="playBtn">
      <svg class="play-icon" id="playIcon" viewBox="0 0 24 24" width="28" height="28">
        <polygon points="6,3 20,12 6,21" fill="currentColor"/>
      </svg>
      <svg class="pause-icon hidden" id="pauseIcon" viewBox="0 0 24 24" width="28" height="28">
        <rect x="5" y="3" width="4" height="18" rx="1" fill="currentColor"/>
        <rect x="15" y="3" width="4" height="18" rx="1" fill="currentColor"/>
      </svg>
    </button>

    <div class="slider-group">
      <div class="slider-row">
        <label class="slider-label">Volume</label>
        <input type="range" class="slider" id="volumeSlider" min="0" max="100" value="30">
        <span class="slider-value" id="volumeValue">30%</span>
      </div>
      <div class="slider-row">
        <label class="slider-label">Carrier</label>
        <input type="range" class="slider" id="carrierSlider" min="150" max="300" value="200">
        <span class="pro-label hidden" id="carrierProLabel">PRO</span>
        <span class="slider-value" id="carrierValue">200 Hz</span>
      </div>
    </div>

    <div class="timer-section">
      <label class="timer-label">Timer</label>
      <div class="timer-buttons">
        <button class="timer-btn" data-minutes="15">15m</button>
        <button class="timer-btn" data-minutes="25">25m</button>
        <button class="timer-btn" data-minutes="45">45m<span class="lock-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></span></button>
        <button class="timer-btn" data-minutes="60">60m<span class="lock-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></span></button>
        <button class="timer-btn active" data-minutes="0">OFF</button>
      </div>
      <div class="timer-display hidden" id="timerDisplay">
        <span id="timerCountdown">00:00</span>
      </div>
    </div>

    <div class="headphone-notice hidden" id="headphoneNotice">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
        <path d="M12 1a9 9 0 0 0-9 9v7a3 3 0 0 0 3 3h1a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2H5v-2a7 7 0 1 1 14 0v2h-2a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h1a3 3 0 0 0 3-3v-7a9 9 0 0 0-9-9z"/>
      </svg>
      <span>Headphones recommended for binaural effect</span>
    </div>
  </div>

  <div class="modal-overlay hidden" id="upgradeModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-panel">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div class="modal-header">
        <span class="modal-badge">PRO</span>
        <h2 class="modal-title" id="modalTitle">Unlock FocusWave Pro</h2>
      </div>
      <ul class="modal-features">
        <li>All 5 presets — Delta, Theta, Gamma</li>
        <li>Extended timers — 45m and 60m</li>
        <li>Carrier frequency control (150–300 Hz)</li>
      </ul>
      <div class="modal-input-group">
        <input type="text" class="modal-key-input" id="licenseKeyInput"
          placeholder="FWPRO-XXXXXXXX-XXXX" maxlength="19" spellcheck="false" autocomplete="off">
        <button class="modal-activate-btn" id="activateBtn">Activate</button>
      </div>
      <p class="modal-status hidden" id="modalStatus"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
